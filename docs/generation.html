<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oupeinpo - génération</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #24211d;
      --muted: #666058;
      --line: #d8d2c8;
      --paper: #f7f4ef;
      --panel: #ffffff;
      --accent: #176b63;
      --accent-dark: #104f49;
      --soft: #ece6dc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background: var(--paper);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 500;
      line-height: 1;
      overflow-wrap: anywhere;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.15rem;
      font-weight: 600;
    }

    a {
      color: var(--accent-dark);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    nav a {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 8px 10px;
      border-radius: 4px;
      color: var(--ink);
      text-decoration: none;
    }

    .tagline {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.45;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 24px;
      margin-top: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 18px;
      min-width: 0;
    }

    .outputs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .output {
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
      min-width: 0;
    }

    .output img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      border: 1px solid #e5ded3;
      background: var(--soft);
    }

    .caption {
      margin-top: 9px;
      color: var(--muted);
      font-size: .82rem;
      overflow-wrap: anywhere;
      line-height: 1.35;
    }

    dl {
      display: grid;
      grid-template-columns: minmax(120px, .6fr) minmax(0, 1fr);
      gap: 10px 12px;
      margin: 0;
    }

    dt {
      color: var(--muted);
    }

    dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .raw {
      margin-top: 16px;
      display: inline-block;
    }

    .rewards {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .reward-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .reward-list li {
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
      overflow-wrap: anywhere;
    }

    .reward-list strong {
      display: block;
      margin-bottom: 6px;
    }

    .empty {
      border: 1px dashed var(--line);
      padding: 24px 14px;
      color: var(--muted);
      background: #fbfaf7;
      text-align: center;
    }

    @media (max-width: 900px) {
      main { width: min(100% - 20px, 720px); padding-top: 18px; }
      header { grid-template-columns: 1fr; }
      nav { justify-content: flex-start; }
      .layout { grid-template-columns: 1fr; }
      dl { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1 id="title">Génération Oupeinpo</h1>
        <p class="tagline" id="subtitle">Chargement du point de registre depuis l’API.</p>
      </div>
      <nav aria-label="Navigation">
        <a href="index.html">Contribuer</a>
        <a href="explorer.html">Registre de l’Ouvroir</a>
      </nav>
    </header>

    <div class="layout">
      <section class="panel">
        <h2>Peintures informatiques</h2>
        <div class="outputs" id="outputs"></div>
        <div class="rewards">
          <h2>Droits d’usage</h2>
          <ul class="reward-list" id="rewards"></ul>
        </div>
      </section>

      <aside class="panel">
        <h2>Informations du registre</h2>
        <dl id="metadata"></dl>
        <a class="raw" id="raw-json" href="#">Voir le JSON brut</a>
      </aside>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const requestedId = params.get("id");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const outputs = document.getElementById("outputs");
    const metadata = document.getElementById("metadata");
    const rewards = document.getElementById("rewards");
    const rawJson = document.getElementById("raw-json");
    const DEFAULT_API_BASE_URL = "https://survie.tailc688f6.ts.net";

    function resolveApiBaseUrl() {
      const configured = params.get("api");
      if (configured) {
        return configured.replace(/\/+$/, "");
      }

      if (window.location.protocol === "file:") {
        return DEFAULT_API_BASE_URL;
      }

      if (["localhost", "127.0.0.1", "::1"].includes(window.location.hostname)) {
        return `${window.location.origin}`.replace(/\/+$/, "");
      }

      if (window.location.hostname.includes("github.io")) {
        return DEFAULT_API_BASE_URL;
      }

      return window.location.origin.replace(/\/+$/, "") || DEFAULT_API_BASE_URL;
    }

    function preserveApiOnStaticLinks() {
      const currentApi = params.get("api");
      if (!currentApi) return;

      document.querySelectorAll("a[href]").forEach((link) => {
        const href = link.getAttribute("href") || "";
        if (!/^[^:/#?]+\.html(\?.*)?$/.test(href)) return;
        const [page, query = ""] = href.split("?");
        const url = new URL(page, window.location.href);
        new URLSearchParams(query).forEach((value, key) => url.searchParams.set(key, value));
        url.searchParams.set("api", currentApi);
        link.href = `${url.pathname.split("/").pop()}${url.search}`;
      });
    }

    const API_BASE_URL = resolveApiBaseUrl();

    function formatDate(value) {
      if (!value) return "-";
      return new Intl.DateTimeFormat("fr-BE", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function field(label, value) {
      return `<dt>${label}</dt><dd>${value || "-"}</dd>`;
    }

    function asAbsoluteUrl(jobId, path) {
      if (!path) return "";
      if (path.startsWith("http")) return path;
      if (path.startsWith("/")) return `${API_BASE_URL}${path}`;
      if (path.startsWith("local-results/")) return `${API_BASE_URL}/${path}`;
      return `${API_BASE_URL}/local-results/${jobId}/${path}`;
    }

    function escapeAttribute(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function outputImageCandidates(jobId, path) {
      if (!path) return [];
      if (path.startsWith("http")) return [path];

      const synthMatch = path.match(/^synth\/(cluster_fused_\d+)\.png$/i);
      if (synthMatch) {
        return [
          asAbsoluteUrl(jobId, `thumbs/${synthMatch[1]}.webp`),
          asAbsoluteUrl(jobId, path)
        ];
      }

      const thumbMatch = path.match(/^thumbs\/(cluster_fused_\d+)\.webp$/i);
      if (thumbMatch) {
        return [
          asAbsoluteUrl(jobId, path),
          asAbsoluteUrl(jobId, `synth/${thumbMatch[1]}.png`)
        ];
      }

      return [asAbsoluteUrl(jobId, path)];
    }

    function useImageFallback(image) {
      const fallback = image.dataset.fallbackSrc;
      if (fallback) {
        image.dataset.fallbackSrc = "";
        image.src = fallback;
      } else {
        image.removeAttribute("onerror");
      }
    }

    function outputImageTag(jobId, output) {
      const candidates = outputImageCandidates(jobId, output.path);
      if (!candidates.length) return "";
      const fallback = candidates[1] ? ` data-fallback-src="${escapeAttribute(candidates[1])}" onerror="useImageFallback(this)"` : "";
      return `<img src="${escapeAttribute(candidates[0])}"${fallback} alt="${escapeAttribute(`Image generee ${jobId} sortie ${output.index}`)}">`;
    }

    function nmncStatusLabel(status) {
      const labels = {
        mined: "miné",
        pending_mining: "validé, à miner",
        approval_failed: "validation à reprendre",
        rejected: "refusé",
        not_submitted: "non soumis OUP2",
        pending: "en attente"
      };
      return labels[status] || status || "non soumis OUP2";
    }

    function nmncAnchorReference(anchor) {
      if (!anchor) return "non miné";
      return anchor.block_hash || anchor.txid || anchor.payload_hash || "non miné";
    }

    function rightsSummary(entry) {
      const actualNo = Number(entry.reward_total_no || 0);
      const potentialNo = Number(entry.potential_reward_total_no || 0);
      if (actualNo > 0) {
        return `${entry.reward_total_nmnc} NMNC acquis (${actualNo} no)`;
      }
      if (potentialNo > 0) {
        return `${entry.potential_reward_total_nmnc} NMNC potentiels pour le lot si la génération est minée (${potentialNo} no)`;
      }
      return "aucun droit NMNC associé";
    }

    function rewardListHtml(entry) {
      if (!entry.nmnc_address) {
        return '<li>Aucune adresse NMNC publique associee a cette génération.</li>';
      }

      const actualNo = Number(entry.reward_total_no || 0);
      const potentialNo = Number(entry.potential_reward_total_no || 0);
      const outputCount = actualNo > 0 ? entry.reward_output_count : entry.potential_reward_output_count;
      const amount = actualNo > 0 ? entry.reward_total_nmnc : entry.potential_reward_total_nmnc;
      const title = actualNo > 0 ? `${amount} NMNC acquis` : `${amount} NMNC potentiels pour le lot`;
      const detail = actualNo > 0
        ? `Droits d’usage acquis : ${entry.reward_total_no || 0} no`
        : potentialNo > 0
          ? `Droits d’usage potentiels du lot si minage OUP2 : ${entry.potential_reward_total_no || 0} no`
          : "Droits d’usage : aucun droit NMNC associé pour l’instant";

      return `
        <li>
          <strong>${title}</strong>
          Adresse associee : ${entry.nmnc_address}<br>
          ${detail}<br>
          Peintures informatiques : ${outputCount || entry.outputs.length || 1}
        </li>
      `;
    }

    function normalizeOutputs(tx) {
      if (Array.isArray(tx.outputs) && tx.outputs.length) {
        return tx.outputs.map((output, index) => ({
          index: output.index || index + 1,
          path: output.path || output.url || output.image_path,
          sha256: output.sha256 || output.image_sha256 || tx.image_sha256_seed
        })).filter((output) => output.path);
      }

      const candidates = [
        tx.preview_image,
        tx.image_path,
        tx.output_image,
        tx.generated_image,
        tx.result_image
      ].filter(Boolean);

      return candidates.map((path, index) => ({
        index: index + 1,
        path,
        sha256: tx.image_sha256_seed || tx.image_hash
      }));
    }

    function normalizeEntry(tx) {
      const jobId = tx.job_id || tx.id;
      const height = tx.oupeinpo_height || tx.job_index || tx.sequence || tx.index;
      return {
        id: jobId,
        height,
        created_at: tx.created_at || tx.timestamp,
        source_count: tx.source_count || "-",
        cluster_count: tx.cluster_count || "-",
        generation_hash: tx.generation_hash || tx.block_hash,
        previous_generation_hash: tx.previous_generation_hash || tx.previous_block_hash,
        rewards_hash: tx.rewards_hash || (tx.expected_coinbase_rewards && tx.expected_coinbase_rewards.rewards_hash),
        nmnc_address: tx.nmnc_address,
        reward_total_no: tx.reward_total_no ?? 0,
        reward_total_nmnc: tx.reward_total_nmnc ?? "0.00000000",
        reward_user_count: tx.reward_user_count || (tx.nmnc_address ? 1 : 0),
        reward_output_count: tx.reward_output_count || 0,
        potential_reward_total_no: tx.potential_reward_total_no ?? (tx.expected_coinbase_rewards && tx.expected_coinbase_rewards.total_amount_no) ?? 0,
        potential_reward_total_nmnc: tx.potential_reward_total_nmnc ?? (tx.expected_coinbase_rewards && tx.expected_coinbase_rewards.total_amount_nmnc) ?? "0.00000000",
        potential_reward_output_count: tx.potential_reward_output_count || 0,
        potential_reward_user_count: tx.potential_reward_user_count || (tx.nmnc_address ? 1 : 0),
        nmnc_anchor: tx.nmnc_anchor || { status: "not_submitted" },
        outputs: normalizeOutputs(tx),
        raw: tx
      };
    }

    async function loadGeneration() {
      try {
        const response = await fetch(`${API_BASE_URL}/global-blockchain.json`, { cache: "no-store" });
        const chain = await response.json();
        const transactions = chain.transactions || [];
        const tx = requestedId
          ? transactions.find((item) => (item.job_id || item.id) === requestedId)
          : transactions[transactions.length - 1];
        if (!tx) throw new Error("empty ledger");

        const entry = normalizeEntry(tx);
        const resultIndexUrl = `${API_BASE_URL}/local-results/${entry.id}/index.html`;

        title.textContent = `Génération Oupeinpo #${String(entry.height).padStart(6, "0")}`;
        subtitle.textContent = `${formatDate(entry.created_at)} - ${entry.source_count} images sources privees, ${entry.cluster_count} clusters, ${entry.outputs.length || 1} peinture(s) informatique(s), ${rightsSummary(entry)}.`;
        rawJson.href = `${API_BASE_URL}/global-blockchain.json`;

        outputs.innerHTML = entry.outputs.length ? entry.outputs.map((output) => `
          <article class="output">
            ${outputImageTag(entry.id, output)}
            <div class="caption">SHA256 ${output.sha256 || "-"}</div>
          </article>
        `).join("") : `<div class="empty"><a href="${resultIndexUrl}">Voir les images generees sur le serveur</a>.</div>`;

        rewards.innerHTML = rewardListHtml(entry);

        metadata.innerHTML = [
          field("Identifiant", entry.id),
          field("Hauteur Oupeinpo", entry.height),
          field("Empreinte de génération", entry.generation_hash),
          field("Empreinte précédente", entry.previous_generation_hash || "genesis"),
          field("Empreinte des droits", entry.rewards_hash),
          field("Droits acquis no", entry.reward_total_no),
          field("Droits acquis NMNC", entry.reward_total_nmnc),
          field("Droits potentiels no", entry.potential_reward_total_no),
          field("Droits potentiels NMNC", entry.potential_reward_total_nmnc),
          field("Images sources", entry.source_count),
          field("Clusters", entry.cluster_count),
          field("Adresse NMNC", entry.nmnc_address),
          field("Inscription NMNC", nmncAnchorReference(entry.nmnc_anchor)),
          field("État NMNC", nmncStatusLabel(entry.nmnc_anchor && entry.nmnc_anchor.status))
        ].join("");
      } catch (error) {
        title.textContent = "Génération introuvable";
        subtitle.textContent = "Le point demande n’existe pas dans le registre public.";
        outputs.innerHTML = '<div class="empty">Aucune image a afficher.</div>';
        rewards.innerHTML = "";
        metadata.innerHTML = "";
        rawJson.removeAttribute("href");
      }
    }

    preserveApiOnStaticLinks();
    loadGeneration();
  </script>
</body>
</html>
