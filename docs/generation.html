<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oupeinpo - bloc</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #24211d;
      --muted: #666058;
      --line: #d8d2c8;
      --paper: #f7f4ef;
      --panel: #ffffff;
      --accent: #176b63;
      --accent-dark: #104f49;
      --soft: #ece6dc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background: var(--paper);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 500;
      line-height: 1;
      overflow-wrap: anywhere;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.15rem;
      font-weight: 600;
    }

    a {
      color: var(--accent-dark);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    nav a {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 8px 10px;
      border-radius: 4px;
      color: var(--ink);
      text-decoration: none;
    }

    .tagline {
      margin: 10px 0 0;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.45;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 24px;
      margin-top: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 18px;
      min-width: 0;
    }

    .outputs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .output {
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
      min-width: 0;
    }

    .output img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      border: 1px solid #e5ded3;
      background: var(--soft);
    }

    .caption {
      margin-top: 9px;
      color: var(--muted);
      font-size: .82rem;
      overflow-wrap: anywhere;
      line-height: 1.35;
    }

    dl {
      display: grid;
      grid-template-columns: minmax(120px, .6fr) minmax(0, 1fr);
      gap: 10px 12px;
      margin: 0;
    }

    dt {
      color: var(--muted);
    }

    dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .raw {
      margin-top: 16px;
      display: inline-block;
    }

    .rewards {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .reward-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .reward-list li {
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
      overflow-wrap: anywhere;
    }

    .reward-list strong {
      display: block;
      margin-bottom: 6px;
    }

    .empty {
      border: 1px dashed var(--line);
      padding: 24px 14px;
      color: var(--muted);
      background: #fbfaf7;
      text-align: center;
    }

    @media (max-width: 900px) {
      main { width: min(100% - 20px, 720px); padding-top: 18px; }
      header { grid-template-columns: 1fr; }
      nav { justify-content: flex-start; }
      .layout { grid-template-columns: 1fr; }
      dl { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1 id="title">Bloc Oupeinpo</h1>
        <p class="tagline" id="subtitle">Chargement du point de registre depuis l’API.</p>
      </div>
      <nav aria-label="Navigation">
        <a href="index.html">Contribuer</a>
        <a href="explorer.html">Explorer</a>
      </nav>
    </header>

    <div class="layout">
      <section class="panel">
        <h2>Images generees</h2>
        <div class="outputs" id="outputs"></div>
        <div class="rewards">
          <h2>Droits d’usage</h2>
          <ul class="reward-list" id="rewards"></ul>
        </div>
      </section>

      <aside class="panel">
        <h2>Informations du registre</h2>
        <dl id="metadata"></dl>
        <a class="raw" id="raw-json" href="#">Voir le JSON brut</a>
      </aside>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const requestedId = params.get("id");
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const outputs = document.getElementById("outputs");
    const metadata = document.getElementById("metadata");
    const rewards = document.getElementById("rewards");
    const rawJson = document.getElementById("raw-json");
    const API_BASE_URL = "https://survie.tailc688f6.ts.net";

    function formatDate(value) {
      if (!value) return "-";
      return new Intl.DateTimeFormat("fr-BE", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(value));
    }

    function field(label, value) {
      return `<dt>${label}</dt><dd>${value || "-"}</dd>`;
    }

    function asAbsoluteUrl(jobId, path) {
      if (!path) return "";
      if (path.startsWith("http")) return path;
      if (path.startsWith("/")) return `${API_BASE_URL}${path}`;
      if (path.startsWith("local-results/")) return `${API_BASE_URL}/${path}`;
      return `${API_BASE_URL}/local-results/${jobId}/${path}`;
    }

    function normalizeOutputs(tx) {
      if (Array.isArray(tx.outputs) && tx.outputs.length) {
        return tx.outputs.map((output, index) => ({
          index: output.index || index + 1,
          path: output.path || output.url || output.image_path,
          sha256: output.sha256 || output.image_sha256 || tx.image_sha256_seed
        })).filter((output) => output.path);
      }

      const candidates = [
        tx.preview_image,
        tx.image_path,
        tx.output_image,
        tx.generated_image,
        tx.result_image
      ].filter(Boolean);

      return candidates.map((path, index) => ({
        index: index + 1,
        path,
        sha256: tx.image_sha256_seed || tx.image_hash
      }));
    }

    function normalizeEntry(tx) {
      const jobId = tx.job_id || tx.id;
      const height = tx.oupeinpo_height || tx.job_index || tx.sequence || tx.index;
      return {
        id: jobId,
        height,
        created_at: tx.created_at || tx.timestamp,
        source_count: tx.source_count || "-",
        cluster_count: tx.cluster_count || "-",
        generation_hash: tx.generation_hash || tx.block_hash,
        previous_generation_hash: tx.previous_generation_hash || tx.previous_block_hash,
        rewards_hash: tx.rewards_hash || (tx.expected_coinbase_rewards && tx.expected_coinbase_rewards.rewards_hash),
        nmnc_address: tx.nmnc_address,
        reward_total_no: tx.reward_total_no || (tx.expected_coinbase_rewards && tx.expected_coinbase_rewards.total_amount_no) || 0,
        reward_total_nmnc: tx.reward_total_nmnc || (tx.expected_coinbase_rewards && tx.expected_coinbase_rewards.total_amount_nmnc) || "0.00000000",
        reward_user_count: tx.reward_user_count || (tx.nmnc_address ? 1 : 0),
        nmnc_anchor: tx.nmnc_anchor || { status: "pending" },
        outputs: normalizeOutputs(tx),
        raw: tx
      };
    }

    async function loadGeneration() {
      try {
        const response = await fetch(`${API_BASE_URL}/global-blockchain.json`, { cache: "no-store" });
        const chain = await response.json();
        const transactions = chain.transactions || [];
        const tx = transactions.find((item) => (item.job_id || item.id) === requestedId) || transactions[transactions.length - 1];
        if (!tx) throw new Error("empty ledger");

        const entry = normalizeEntry(tx);
        const resultIndexUrl = `${API_BASE_URL}/local-results/${entry.id}/index.html`;

        title.textContent = `Bloc Oupeinpo #${String(entry.height).padStart(6, "0")}`;
        subtitle.textContent = `${formatDate(entry.created_at)} - ${entry.source_count} images sources privees, ${entry.cluster_count} clusters, ${entry.outputs.length || 1} peinture(s) informatique(s), ${entry.reward_total_no || 0} no en droits d’usage.`;
        rawJson.href = `${API_BASE_URL}/global-blockchain.json`;

        outputs.innerHTML = entry.outputs.length ? entry.outputs.map((output) => `
          <article class="output">
            <img src="${asAbsoluteUrl(entry.id, output.path)}" alt="Image generee ${entry.id} sortie ${output.index}">
            <div class="caption">SHA256 ${output.sha256 || "-"}</div>
          </article>
        `).join("") : `<div class="empty"><a href="${resultIndexUrl}">Voir les images generees sur le serveur</a>.</div>`;

        rewards.innerHTML = entry.nmnc_address
          ? `
            <li>
              <strong>${entry.reward_total_nmnc} NMNC</strong>
              Adresse associee : ${entry.nmnc_address}<br>
              Droits d’usage : ${entry.reward_total_no || 0} no<br>
              Peintures informatiques : ${entry.outputs.length || 1}
            </li>
          `
          : '<li>Aucune adresse NMNC publique associee a ce bloc.</li>';

        metadata.innerHTML = [
          field("Identifiant", entry.id),
          field("Hauteur Oupeinpo", entry.height),
          field("Generation hash", entry.generation_hash),
          field("Hash precedent", entry.previous_generation_hash || "genesis"),
          field("Rewards hash", entry.rewards_hash),
          field("Droits no", entry.reward_total_no),
          field("Droits NMNC", entry.reward_total_nmnc),
          field("Images sources", entry.source_count),
          field("Clusters", entry.cluster_count),
          field("Adresse NMNC", entry.nmnc_address),
          field("Ancrage NMNC", entry.nmnc_anchor && entry.nmnc_anchor.txid ? entry.nmnc_anchor.txid : "pending"),
          field("Statut NMNC", entry.nmnc_anchor && entry.nmnc_anchor.status ? entry.nmnc_anchor.status : "pending")
        ].join("");
      } catch (error) {
        title.textContent = "Bloc introuvable";
        subtitle.textContent = "Le point demande n’existe pas dans le registre public.";
        outputs.innerHTML = '<div class="empty">Aucune image a afficher.</div>';
        rewards.innerHTML = "";
        metadata.innerHTML = "";
        rawJson.removeAttribute("href");
      }
    }

    loadGeneration();
  </script>
</body>
</html>
